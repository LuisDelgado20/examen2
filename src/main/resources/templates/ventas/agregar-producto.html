<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema X | Agregar Producto</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item dropdown">
                <span class="nav-link" th:text="${usuarioLogueado}">Luis</span>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="/dashboard" class="brand-link">
            <span class="brand-text font-weight-light">Sistema X</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item">
                        <a href="/dashboard" class="nav-link">
                            <i class="nav-icon fas fa-home"></i>
                            <p>Inicio</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/productos" class="nav-link ">
                            <i class="nav-icon fas fa-box"></i>
                            <p>Productos</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/ventas" class="nav-link active">
                            <i class="nav-icon fas fa-shopping-cart"></i>
                            <p>Ventas</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/facturas/listado" class="nav-link">
                            <i class="nav-icon fas fa-file-invoice"></i>
                            <p>Facturacion</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>
    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>Agregar Producto a Venta</h1>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card card-warning">
                            <div class="card-header">
                                <h3 class="card-title">
                                    <i class="fas fa-cart-plus mr-1"></i>
                                    Venta #<span th:text="${venta.id}"></span> - Cliente: <span th:text="${venta.nombreCliente}"></span>
                                </h3>
                            </div>
                            <form th:action="@{/ventas/guardar-detalle}" method="post">
                                <div class="card-body">
                                    <input type="hidden" name="ventaId" th:value="${venta.id}">

                                    <div class="form-group">
                                        <label for="producto">Seleccionar Producto/Servicio</label>
                                        <select name="productoId" id="producto" class="form-control custom-select" required>
                                            <option value="" disabled selected>Seleccione uno...</option>
                                            <option th:each="prod : ${productos}"
                                                    th:value="${prod.id}"
                                                    th:text="${prod.nombreProducto} + ' - $' + ${prod.precio}">
                                            </option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <label for="cantidad">Cantidad</label>
                                        <input type="number" name="cantidad" id="cantidad" class="form-control"
                                               value="1" min="1" required>
                                    </div>
                                </div>

                                <div class="card-footer text-right">
                                    <a th:href="@{/ventas}" class="btn btn-default">Cancelar</a>
                                    <button type="submit" class="btn btn-warning">
                                        <b>Guardar Selección</b>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
