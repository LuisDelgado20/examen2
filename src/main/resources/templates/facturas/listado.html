<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Sistema X | Facturación</title>
  <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>

    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <span class="nav-link">
          <i class="fas fa-user"></i>
          <span class="ml-1" th:text="${usuarioLogueado}">Luis</span>
        </span>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="/" class="brand-link">
      <span class="brand-text font-weight-light ml-3">Sistema X</span>
    </a>

    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
          <li class="nav-item">
            <a href="/dashboard" class="nav-link ">
              <i class="nav-icon fas fa-home"></i>
              <p>Inicio</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="/productos" class="nav-link">
              <i class="nav-icon fas fa-box"></i>
              <p>Productos</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="/ventas" class="nav-link">
              <i class="nav-icon fas fa-shopping-cart"></i>
              <p>Ventas</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="/facturas/listado" class="nav-link active">
              <i class="nav-icon fas fa-file-invoice-dollar"></i>
              <p>Facturacion</p>
            </a>
          </li>
          <li class="nav-item mt-3">
            <a href="/auth/login" class="nav-link">
              <i class="nav-icon fas fa-sign-out-alt"></i>
              <p>Salir</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header"><h1>Facturación</h1></section>
    <section class="content">
      <div class="card">
        <div class="card-body p-0">
          <table class="table table-striped">
            <thead>
            <tr>
              <th>Id</th>
              <th>Nombre</th>
              <th>Total</th>
              <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${ventas}">
              <td th:text="${v.id}">1</td>
              <td th:text="${v.nombreCliente}">Cliente</td>
              <td th:text="'$' + ${v.total}">$0.00</td>
              <td th:text="${v.estado}">Estado</td>
              <td>
                <a th:if="${v != null}"
                   th:href="@{/facturas/factura/{id}(id=${v.id})}"
                   class="btn btn-warning">
                  <i class="fas fa-file-invoice"></i> Generar
                </a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</div>
</body>
</html>
